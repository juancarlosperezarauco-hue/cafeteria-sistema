<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reportes · Cafetería</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: #F5F0E8; min-height: 100vh; padding: 24px; color: #3A3A3A; }
        .container { max-width: 1300px; margin: 0 auto; }
        .nav { display: flex; gap: 32px; padding-bottom: 20px; margin-bottom: 24px; border-bottom: 1px solid rgba(156, 175, 136, 0.2); }
        .nav a { color: #5C7A67; text-decoration: none; font-size: 15px; font-weight: 450; padding-bottom: 4px; border-bottom: 2px solid transparent; }
        .nav a:hover { color: #3E5C4B; border-bottom-color: #9CAF88; }
        .nav a.active { color: #3E5C4B; border-bottom-color: #9CAF88; }
        h1 { font-size: 32px; font-weight: 450; color: #3E5C4B; margin-bottom: 28px; }
        .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 32px; }
        .kpi-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(8px); padding: 24px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.6); }
        .kpi-label { font-size: 13px; color: #7C9082; text-transform: uppercase; margin-bottom: 8px; }
        .kpi-value { font-size: 36px; font-weight: 350; color: #3E5C4B; }
        .charts-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px; margin-bottom: 32px; }
        .chart-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(8px); padding: 24px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.6); }
        .chart-title { font-size: 16px; font-weight: 500; color: #5C7A67; margin-bottom: 20px; }
        .table-wrapper { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(8px); padding: 24px; border-radius: 20px; margin-bottom: 24px; }
        .section-title { font-size: 16px; font-weight: 500; color: #5C7A67; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px 0; font-weight: 450; color: #7C9082; font-size: 13px; border-bottom: 1px solid rgba(156, 175, 136, 0.2); }
        td { padding: 14px 0; border-bottom: 1px solid rgba(156, 175, 136, 0.1); color: #3A3A3A; }
        .badge { background: rgba(156, 175, 136, 0.15); color: #5C7A67; padding: 4px 10px; border-radius: 20px; font-size: 12px; }
        .badge-success { background: rgba(92, 122, 103, 0.12); color: #3E5C4B; }
        .badge-warning { background: rgba(196, 164, 132, 0.12); color: #9B7B5E; }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav">
            <a href="/">Inicio</a>
            <a href="/reportes.html" class="active">Reportes</a>
            <a href="/admin.html">Administración</a>
            <a href="/pedidos.html">Pedidos</a>
        </div>
        <h1>Análisis</h1>
        <div class="kpi-grid">
            <div class="kpi-card"><div class="kpi-label">Ventas totales</div><div class="kpi-value" id="ventasTotales">$0</div></div>
            <div class="kpi-card"><div class="kpi-label">Pedidos</div><div class="kpi-value" id="totalPedidos">0</div></div>
            <div class="kpi-card"><div class="kpi-label">Ticket promedio</div><div class="kpi-value" id="ticketPromedio">$0</div></div>
            <div class="kpi-card"><div class="kpi-label">Clientes</div><div class="kpi-value" id="totalClientes">0</div></div>
        </div>
        <div class="charts-grid">
            <div class="chart-card"><div class="chart-title">Productos más populares</div><canvas id="productosChart"></canvas></div>
            <div class="chart-card"><div class="chart-title">Ventas · Última semana</div><canvas id="ventasChart"></canvas></div>
        </div>
        <div class="table-wrapper">
            <div class="section-title">Clientes frecuentes</div>
            <table><thead><tr><th>Nombre</th><th>Contacto</th><th>Puntos</th><th>Registro</th></tr></thead>
            <tbody id="clientesBody"><tr><td colspan="4">Cargando...</td></tr></tbody></table>
        </div>
        <div class="table-wrapper">
            <div class="section-title">Catálogo</div>
            <table><thead><tr><th>Producto</th><th>Categoría</th><th>Precio</th><th>Estado</th></tr></thead>
            <tbody id="productosBody"><tr><td colspan="4">Cargando...</td></tr></tbody></table>
        </div>
    </div>
    <script type="module">
        const SUPABASE_URL = 'https://knciklpjeboeznbvajil.supabase.co'
        const SUPABASE_KEY = 'sb_publishable_8xwi4BOCYmqXx-VqdXuZwA_cmd5CeNj'
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY)
        async function cargarTodo() {
            await cargarKPIs()
            await cargarProductos()
            await cargarClientes()
            cargarGraficas()
        }
        async function cargarKPIs() {
            const { count } = await supabase.from('clientes').select('*', { count: 'exact', head: true })
            document.getElementById('totalClientes').textContent = count || 0
            const { data: pedidos } = await supabase.from('pedidos').select('total').eq('estado', 'Entregado')
            if (pedidos && pedidos.length > 0) {
                const total = pedidos.reduce((sum, p) => sum + Number(p.total), 0)
                document.getElementById('ventasTotales').textContent = `$${total.toFixed(0)}`
                document.getElementById('totalPedidos').textContent = pedidos.length
                document.getElementById('ticketPromedio').textContent = `$${(total / pedidos.length).toFixed(0)}`
            } else {
                document.getElementById('ventasTotales').textContent = '$0'
                document.getElementById('totalPedidos').textContent = '0'
                document.getElementById('ticketPromedio').textContent = '$0'
            }
        }
        async function cargarProductos() {
            const { data, error } = await supabase.from('productos').select('*, categorias(nombre)').order('nombre')
            const tbody = document.getElementById('productosBody')
            if (error || !data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4">No hay productos</td></tr>'
                return
            }
            tbody.innerHTML = data.map(p => `<tr><td>${p.nombre}</td><td>${p.categorias?.nombre || 'General'}</td><td>$${Number(p.precio).toFixed(2)}</td><td><span class="badge ${p.disponible ? 'badge-success' : 'badge-warning'}">${p.disponible ? 'Disponible' : 'Agotado'}</span></td></tr>`).join('')
        }
        async function cargarClientes() {
            const { data, error } = await supabase.from('clientes').select('*').order('puntos_fidelidad', { ascending: false })
            const tbody = document.getElementById('clientesBody')
            if (error || !data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4">Sin clientes registrados</td></tr>'
                return
            }
            tbody.innerHTML = data.map(c => `<tr><td>${c.nombre}</td><td>${c.email || c.telefono || '—'}</td><td>${c.puntos_fidelidad}</td><td>${new Date(c.fecha_registro).toLocaleDateString('es')}</td></tr>`).join('')
        }
        function cargarGraficas() {
            new Chart(document.getElementById('productosChart'), { type: 'doughnut', data: { labels: ['Café', 'Té', 'Postres', 'Sándwiches', 'Bebidas'], datasets: [{ data: [42, 18, 22, 10, 8], backgroundColor: ['#7C9082', '#9CAF88', '#C4A484', '#D4C5B5', '#B5C4A2'] }] }, options: { cutout: '65%', plugins: { legend: { position: 'bottom' } } } })
            new Chart(document.getElementById('ventasChart'), { type: 'line', data: { labels: ['Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb', 'Dom'], datasets: [{ data: [1240, 890, 1520, 1780, 2350, 1980, 1120], borderColor: '#7C9082', borderWidth: 2, tension: 0.3, fill: true }] }, options: { plugins: { legend: { display: false } } } })
        }
        cargarTodo()
    </script>
</body>
</html>
