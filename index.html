<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafetería · Acceso</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: #F5F0E8; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
        .login-container { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(8px); border-radius: 28px; padding: 40px; width: 100%; max-width: 420px; border: 1px solid rgba(255, 255, 255, 0.6); box-shadow: 0 8px 32px rgba(0,0,0,0.04); }
        h1 { font-size: 28px; font-weight: 450; color: #3E5C4B; margin-bottom: 8px; letter-spacing: -0.02em; }
        .subtitle { color: #7C9082; font-size: 14px; margin-bottom: 32px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 13px; font-weight: 450; color: #5C7A67; margin-bottom: 6px; }
        input { width: 100%; padding: 14px 16px; background: white; border: 1.5px solid rgba(156, 175, 136, 0.2); border-radius: 14px; font-size: 15px; transition: all 0.2s; }
        input:focus { outline: none; border-color: #9CAF88; }
        .btn { background: #9CAF88; color: white; border: none; padding: 14px; border-radius: 40px; font-size: 15px; font-weight: 500; cursor: pointer; width: 100%; transition: all 0.2s; }
        .btn:hover { background: #7C9082; }
        .btn-outline { background: transparent; color: #5C7A67; border: 1.5px solid #9CAF88; margin-top: 12px; }
        .btn-outline:hover { background: #9CAF88; color: white; }
        .msg-error { color: #C46B6B; background: rgba(196, 107, 107, 0.06); padding: 12px 16px; border-radius: 14px; margin-bottom: 20px; font-size: 13px; }
        .msg-success { color: #5C7A67; background: rgba(156, 175, 136, 0.12); padding: 12px 16px; border-radius: 14px; margin-bottom: 20px; font-size: 13px; }
        .user-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; padding-bottom: 20px; border-bottom: 1px solid rgba(156, 175, 136, 0.15); }
        .user-badge { background: #9CAF88; color: white; padding: 4px 12px; border-radius: 20px; font-size: 13px; }
        .menu-grid { display: grid; gap: 12px; }
        .menu-card { background: white; padding: 20px; border-radius: 16px; border: 1.5px solid rgba(156, 175, 136, 0.15); cursor: pointer; transition: all 0.2s; text-decoration: none; color: #3A3A3A; display: block; }
        .menu-card:hover { border-color: #9CAF88; transform: translateY(-2px); }
        .menu-title { font-size: 18px; font-weight: 500; color: #3E5C4B; margin-bottom: 4px; }
        .menu-desc { font-size: 13px; color: #7C9082; }
        .hidden { display: none; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>
    <div class="login-container" id="loginForm">
        <h1>Cafetería</h1>
        <div class="subtitle">Sistema de gestión</div>
        <div id="mensajeLogin"></div>
        <form onsubmit="login(event)">
            <div class="form-group"><label>Correo electrónico</label><input type="email" id="email" required></div>
            <div class="form-group"><label>Contraseña</label><input type="password" id="password" required></div>
            <button type="submit" class="btn">Iniciar sesión</button>
        </form>
        <div style="margin-top: 24px; padding-top: 20px; border-top: 1px solid rgba(156,175,136,0.15);">
            <p style="font-size: 13px; color: #7C9082; margin-bottom: 8px;">Usuarios de prueba:</p>
            <p style="font-size: 12px; color: #9CAF88;">admin@cafeteria.com / Admin123!<br>cajero@cafeteria.com / Cajero123!<br>barista@cafeteria.com / Barista123!</p>
        </div>
    </div>
    
    <div class="login-container hidden" id="dashboardContainer">
        <div class="user-info flex-between">
            <div><strong id="userEmail"></strong><br><span style="font-size:13px; color:#7C9082;" id="userRole"></span></div>
            <button class="btn-outline" style="padding:8px 16px; width:auto;" onclick="logout()">Salir</button>
        </div>
        <h1 style="font-size:22px;">Menú principal</h1>
        <div class="subtitle" style="margin-bottom:20px;">Selecciona un módulo</div>
        <div class="menu-grid" id="menuGrid"></div>
    </div>

    <script type="module">
        const SUPABASE_URL = 'https://knciklpjeboeznbvajil.supabase.co'
        const SUPABASE_KEY = 'sb_publishable_8xwi4BOCYmqXx-VqdXuZwA_cmd5CeNj'
        
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY)
        
        let usuarioActual = null
        
        const modulos = {
            Admin: [
                { nombre: 'Pedidos', desc: 'Punto de venta', url: '/pedidos.html' },
                { nombre: 'Reportes', desc: 'Análisis y estadísticas', url: '/reportes.html' },
                { nombre: 'Administración', desc: 'Productos, categorías, mesas', url: '/admin.html' }
            ],
            Cajero: [
                { nombre: 'Pedidos', desc: 'Punto de venta', url: '/pedidos.html' }
            ],
            Barista: [
                { nombre: 'Pedidos Activos', desc: 'Ver y actualizar estado', url: '/pedidos.html' }
            ]
        }
        
        window.login = async function(e) {
            e.preventDefault()
            const msg = document.getElementById('mensajeLogin')
            const email = document.getElementById('email').value
            const password = document.getElementById('password').value
            
            msg.innerHTML = '<div class="msg-success">Verificando...</div>'
            
            const { data: authData, error: authError } = await supabase.auth.signInWithPassword({ email, password })
            
            if (authError) {
                msg.innerHTML = `<div class="msg-error">Error: ${authError.message}</div>`
                return
            }
            
            const { data: empleado, error: empError } = await supabase
                .from('empleados')
                .select('rol, nombre, apellido')
                .eq('user_id', authData.user.id)
                .single()
            
            if (empError || !empleado) {
                msg.innerHTML = '<div class="msg-error">Usuario no registrado como empleado</div>'
                await supabase.auth.signOut()
                return
            }
            
            usuarioActual = { email: authData.user.email, rol: empleado.rol, nombre: empleado.nombre }
            mostrarDashboard()
        }
        
        function mostrarDashboard() {
            document.getElementById('loginForm').classList.add('hidden')
            document.getElementById('dashboardContainer').classList.remove('hidden')
            document.getElementById('userEmail').textContent = usuarioActual.email
            document.getElementById('userRole').innerHTML = `<span class="user-badge">${usuarioActual.rol}</span>`
            
            const menu = modulos[usuarioActual.rol] || []
            const grid = document.getElementById('menuGrid')
            
            grid.innerHTML = menu.map(m => `
                <a href="${m.url}" class="menu-card">
                    <div class="menu-title">${m.nombre}</div>
                    <div class="menu-desc">${m.desc}</div>
                </a>
            `).join('')
        }
        
        window.logout = async function() {
            await supabase.auth.signOut()
            usuarioActual = null
            document.getElementById('loginForm').classList.remove('hidden')
            document.getElementById('dashboardContainer').classList.add('hidden')
            document.getElementById('email').value = ''
            document.getElementById('password').value = ''
        }
        
        const { data: { session } } = await supabase.auth.getSession()
        if (session) {
            const { data: empleado } = await supabase
                .from('empleados')
                .select('rol, nombre, apellido')
                .eq('user_id', session.user.id)
                .single()
            
            if (empleado) {
                usuarioActual = { email: session.user.email, rol: empleado.rol, nombre: empleado.nombre }
                mostrarDashboard()
            }
        }
    </script>
</body>
</html>
